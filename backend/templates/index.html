<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VocalLift — AI Vocal Extractor</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #080b12;
      --surface: #0f1420;
      --surface2: #161d2e;
      --border: #1e2a42;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --accent3: #f0abfc;
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #22d3ee;
      --error: #f87171;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(0, 229, 255, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124, 58, 237, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(240, 171, 252, 0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.15) 2px, rgba(0, 0, 0, 0.15) 4px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      padding: 2rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.8s ease both;
    }

    .logo-tag {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      border: 1px solid rgba(0, 229, 255, 0.3);
      padding: 0.3rem 0.8rem;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, var(--accent3) 70%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 0.8rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
    }

    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      margin: 1.5rem 0;
    }

    .waveform span {
      display: block;
      width: 3px;
      border-radius: 999px;
      background: var(--accent);
      opacity: 0.6;
      animation: wave 1.2s ease-in-out infinite;
    }

    .waveform span:nth-child(1) {
      height: 8px;
      animation-delay: 0s
    }

    .waveform span:nth-child(2) {
      height: 20px;
      animation-delay: .1s
    }

    .waveform span:nth-child(3) {
      height: 32px;
      animation-delay: .2s
    }

    .waveform span:nth-child(4) {
      height: 24px;
      animation-delay: .3s
    }

    .waveform span:nth-child(5) {
      height: 40px;
      animation-delay: .15s
    }

    .waveform span:nth-child(6) {
      height: 28px;
      animation-delay: .25s
    }

    .waveform span:nth-child(7) {
      height: 16px;
      animation-delay: .05s
    }

    .waveform span:nth-child(8) {
      height: 36px;
      animation-delay: .35s
    }

    .waveform span:nth-child(9) {
      height: 22px;
      animation-delay: .1s
    }

    .waveform span:nth-child(10) {
      height: 12px;
      animation-delay: .2s
    }

    .waveform span:nth-child(11) {
      height: 30px;
      animation-delay: .3s
    }

    .waveform span:nth-child(12) {
      height: 18px;
      animation-delay: .4s
    }

    .waveform span:nth-child(13) {
      height: 8px;
      animation-delay: .15s
    }

    @keyframes wave {

      0%,
      100% {
        transform: scaleY(1);
        opacity: .5
      }

      50% {
        transform: scaleY(1.5);
        opacity: 1
      }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2rem;
      animation: fadeUp 0.8s ease 0.2s both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 2px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      background: var(--surface2);
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(0, 229, 255, 0.04);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2.5rem;
      margin-bottom: 0.8rem;
      filter: grayscale(0.3);
    }

    .drop-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .drop-hint {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .file-preview {
      display: none;
      align-items: center;
      gap: 0.8rem;
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .file-preview.visible {
      display: flex;
    }

    .file-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .file-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: 0.2rem;
      transition: color 0.15s;
    }

    .file-remove:hover {
      color: var(--error);
    }

    .btn-extract {
      display: block;
      width: 100%;
      margin-top: 1.2rem;
      padding: 0.9rem 1.5rem;
      background: var(--accent);
      color: #000;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-extract::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .btn-extract:hover::before {
      transform: translateX(0);
    }

    .btn-extract:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .status {
      display: none;
      margin-top: 1.2rem;
      padding: 1rem 1.2rem;
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .status.visible {
      display: block;
    }

    .status.loading {
      background: rgba(0, 229, 255, 0.06);
      border: 1px solid rgba(0, 229, 255, 0.2);
      color: var(--accent);
    }

    .status.error {
      background: rgba(248, 113, 113, 0.06);
      border: 1px solid rgba(248, 113, 113, 0.2);
      color: var(--error);
    }

    .status.success {
      background: rgba(34, 211, 238, 0.06);
      border: 1px solid rgba(34, 211, 238, 0.2);
      color: var(--success);
    }

    .loader {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 0.6rem;
    }

    .loader span {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s infinite;
    }

    .loader span:nth-child(2) {
      animation-delay: .2s
    }

    .loader span:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: .2;
        transform: scale(.8)
      }

      40% {
        opacity: 1;
        transform: scale(1)
      }
    }

    /* Download buttons row */
    .download-row {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-top: 1rem;
    }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.7rem 1rem;
      background: transparent;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-download.vocals {
      color: var(--success);
      border: 1px solid var(--success);
    }

    .btn-download.vocals:hover {
      background: rgba(34, 211, 238, 0.1);
    }

    .btn-download.no-vocals {
      color: var(--accent3);
      border: 1px solid var(--accent3);
    }

    .btn-download.no-vocals:hover {
      background: rgba(240, 171, 252, 0.08);
    }

    .info-strip {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      animation: fadeUp 0.8s ease 0.4s both;
    }

    .info-pill {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      padding: 0.8rem 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      text-align: center;
    }

    .info-pill .label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .info-pill .value {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .health-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.2rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      animation: fadeUp 0.8s ease 0.6s both;
    }

    .health-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .health-dot.ok {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .health-dot.fail {
      background: var(--error);
      box-shadow: 0 0 6px var(--error);
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      margin-top: 0.8rem;
      border-radius: 999px;
      overflow: hidden;
      display: none;
    }

    .progress-bar.visible {
      display: block;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 999px;
      animation: progress 2.5s ease-in-out infinite;
    }

    @keyframes progress {
      0% {
        width: 0%;
        margin-left: 0
      }

      50% {
        width: 70%;
        margin-left: 15%
      }

      100% {
        width: 0%;
        margin-left: 100%
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <div class="logo-tag">AI-Powered · Demucs htdemucs</div>
      <h1>VocalLift</h1>
      <p class="subtitle">// isolate vocals with neural source separation</p>
      <div class="waveform">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
    </header>

    <div class="card">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".wav,.mp3,.flac,.ogg,.m4a,.aac,.mp4,.wma" />
        <div class="drop-icon">🎵</div>
        <div class="drop-label">Drop your audio file here</div>
        <div class="drop-hint">WAV · MP3 · FLAC · OGG · M4A · AAC</div>
      </div>

      <div class="file-preview" id="filePreview">
        <span class="file-icon">🎧</span>
        <div class="file-info">
          <div class="file-name" id="fileName"></div>
          <div class="file-size" id="fileSize"></div>
        </div>
        <button class="file-remove" id="fileRemove" title="Remove">✕</button>
      </div>

      <button class="btn-extract" id="extractBtn" disabled>Extract Vocals</button>

      <div class="progress-bar" id="progressBar">
        <div class="progress-fill"></div>
      </div>

      <div class="status" id="statusBox"></div>
    </div>

    <div class="info-strip">
      <div class="info-pill"><span class="label">Model</span><span class="value">htdemucs</span></div>
      <div class="info-pill"><span class="label">Mode</span><span class="value">two-stems</span></div>
      <div class="info-pill"><span class="label">Output</span><span class="value">WAV 44.1k</span></div>
      <div class="info-pill"><span class="label">Backend</span><span class="value">Local</span></div>
    </div>

    <div class="health-row">
      <div class="health-dot" id="healthDot"></div>
      <span id="healthText">Checking Demucs…</span>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const fileRemove = document.getElementById('fileRemove');
    const extractBtn = document.getElementById('extractBtn');
    const progressBar = document.getElementById('progressBar');
    const statusBox = document.getElementById('statusBox');
    const healthDot = document.getElementById('healthDot');
    const healthText = document.getElementById('healthText');

    let selectedFile = null;

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
    fileRemove.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      filePreview.classList.remove('visible');
      extractBtn.disabled = true;
      clearStatus();
    });

    function setFile(file) {
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      filePreview.classList.add('visible');
      extractBtn.disabled = false;
      clearStatus();
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function clearStatus() {
      statusBox.className = 'status';
      statusBox.innerHTML = '';
      progressBar.classList.remove('visible');
    }

    function setStatus(type, html) {
      statusBox.className = `status visible ${type}`;
      statusBox.innerHTML = html;
    }

    extractBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      extractBtn.disabled = true;
      progressBar.classList.add('visible');
      setStatus('loading', `
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <span class="loader"><span></span><span></span><span></span></span>
          Running Demucs htdemucs · this may take 1–3 minutes…
        </div>
        <div style="margin-top:0.5rem;opacity:0.7;">Neural source separation in progress. Please keep this tab open.</div>
      `);

      const formData = new FormData();
      formData.append('audio', selectedFile);

      try {
        const response = await fetch('/extract', { method: 'POST', body: formData });
        progressBar.classList.remove('visible');

        if (response.ok) {
          const data = await response.json();

          let downloadButtons = `
            <a class="btn-download vocals" href="${data.vocals_url}" download="${data.vocals_name}">
              🎤 Vocals — ${data.vocals_name}
            </a>`;

          if (data.no_vocals_url) {
            downloadButtons += `
            <a class="btn-download no-vocals" href="${data.no_vocals_url}" download="${data.no_vocals_name}">
              🎸 Instrumental — ${data.no_vocals_name}
            </a>`;
          }

          setStatus('success', `
            <div>✓ Extraction complete · two stems ready</div>
            <div class="download-row">${downloadButtons}</div>
          `);
        } else {
          const data = await response.json();
          setStatus('error', `✗ ${data.error || 'Extraction failed. Check the server console.'}`);
        }
      } catch (err) {
        progressBar.classList.remove('visible');
        setStatus('error', `✗ Network error: ${err.message}`);
      }

      extractBtn.disabled = false;
    });

    async function checkHealth() {
      try {
        const res = await fetch('/health');
        const data = await res.json();
        if (data.demucs_available && data.ffmpeg_available) {
          healthDot.className = 'health-dot ok';
          healthText.textContent = 'Demucs ready · ffmpeg backend active';
        } else if (data.demucs_available && !data.ffmpeg_available) {
          healthDot.className = 'health-dot fail';
          healthText.textContent = '⚠ ffmpeg not found — install ffmpeg and add it to PATH';
        } else {
          healthDot.className = 'health-dot fail';
          healthText.textContent = 'Demucs not found — run: pip install demucs';
        }
      } catch {
        healthDot.className = 'health-dot fail';
        healthText.textContent = 'Server unreachable';
      }
    }

    checkHealth();
  </script>
</body>

</html>
